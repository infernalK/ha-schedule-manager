name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Hassfest validation
      uses: home-assistant/actions/hassfest@master
    - name: HACF validation
      uses: home-assistant/actions/hacs@master