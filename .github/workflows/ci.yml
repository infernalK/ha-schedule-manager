name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
      # Même validateur que HACS.
      # - brands : retirer après PR https://github.com/home-assistant/brands (custom_integrations/schedule_manager)
      # - topics, description : à remplir sur GitHub → About du dépôt ; retirer du ignore ensuite
      - name: Validation HACS
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands topics description