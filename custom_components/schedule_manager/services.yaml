create_schedule:
  name: Create Schedule
  description: Create a new schedule
  fields:
    name:
      name: Name
      description: Name of the schedule
      required: true
      selector:
        text:
    time_blocks:
      name: Time Blocks
      description: >-
        List of blocks. Each block has start_time, end_time and either actions (non-empty list of
        action_type + action_payload objects) or the legacy flat action_type + action_payload.
      required: false
      selector:
        object:
    repeat_days:
      name: Repeat Days
      description: Days of the week to repeat (0=Monday, 6=Sunday)
      required: false
      selector:
        select:
          multiple: true
          options:
            - "0"
            - "1"
            - "2"
            - "3"
            - "4"
            - "5"
            - "6"

enable_schedule:
  name: Enable Schedule
  description: Enable a schedule
  fields:
    schedule_id:
      name: Schedule ID
      description: ID of the schedule to enable
      required: true
      selector:
        text:

disable_schedule:
  name: Disable Schedule
  description: Disable a schedule
  fields:
    schedule_id:
      name: Schedule ID
      description: ID of the schedule to disable
      required: true
      selector:
        text:

delete_schedule:
  name: Delete Schedule
  description: Delete a schedule
  fields:
    schedule_id:
      name: Schedule ID
      description: ID of the schedule to delete
      required: true
      selector:
        text:

update_schedule:
  name: Update Schedule
  description: Update an existing schedule (name, enabled, days, time blocks)
  fields:
    schedule_id:
      name: Schedule ID
      description: ID of the schedule to update
      required: true
      selector:
        text:
    name:
      name: Name
      description: New display name
      required: false
      selector:
        text:
    enabled:
      name: Enabled
      required: false
      selector:
        boolean:
    repeat_days:
      name: Repeat Days
      description: Days 0=Monday … 6=Sunday
      required: false
      selector:
        select:
          multiple: true
          options:
            - "0"
            - "1"
            - "2"
            - "3"
            - "4"
            - "5"
            - "6"
    time_blocks:
      name: Time Blocks
      description: >-
        Full list of blocks when editing time slots (replaces existing). Each block: start_time,
        end_time, and actions[] or legacy action_type / action_payload pair.
      required: false
      selector:
        object:

create_group:
  name: Create Group
  description: Create a new schedule group
  fields:
    name:
      name: Name
      description: Name of the group
      required: true
      selector:
        text:
    schedules:
      name: Schedules
      description: List of schedule IDs
      required: false
      selector:
        select:
          multiple: true
          options: []  # Dynamic
    exclusive:
      name: Exclusive
      description: Whether only one schedule can be active
      required: false
      selector:
        boolean:

enable_group:
  name: Enable Group
  description: Enable a group
  fields:
    group_id:
      name: Group ID
      description: ID of the group to enable
      required: true
      selector:
        text:

disable_group:
  name: Disable Group
  description: Disable a group
  fields:
    group_id:
      name: Group ID
      description: ID of the group to disable
      required: true
      selector:
        text:

set_active_schedule:
  name: Set Active Schedule
  description: Set the active schedule in an exclusive group
  fields:
    group_id:
      name: Group ID
      description: ID of the group
      required: true
      selector:
        text:
    schedule_id:
      name: Schedule ID
      description: ID of the schedule to activate
      required: true
      selector:
        text:

set_override:
  name: Set Override
  description: Set a temporary override
  fields:
    target_entity:
      name: Target Entity
      description: Entity to override
      required: true
      selector:
        entity:
    action_type:
      name: Action Type
      description: Type of action
      required: true
      selector:
        text:
    action_payload:
      name: Action Payload
      description: Payload for the action
      required: true
      selector:
        object:
    duration:
      name: Duration
      description: Duration in seconds
      required: false
      selector:
        number:
          min: 1
          unit_of_measurement: seconds

clear_override:
  name: Clear Override
  description: Clear an override
  fields:
    override_id:
      name: Override ID
      description: ID of the override to clear
      required: true
      selector:
        text:

run_actions:
  name: Run actions
  description: >-
    Immediately run actions for the active time block (similar to scheduler.run_action).
    Without schedule_id: resolve the active block globally (groups + orphan schedules).
    With schedule_id: active block for that schedule only.
  fields:
    schedule_id:
      name: Schedule ID
      description: Optional schedule UUID to choose which schedule’s active block is used.
      required: false
      selector:
        text: